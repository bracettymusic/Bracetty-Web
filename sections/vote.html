<section id="vote">
  <h2 class="section-title">Elige el próximo release</h2>
  <p class="section-subtitle">
    Escucha los previews, vota y comenta cuál quieres que salga primero.
  </p>

  <div class="vote-container">

    <!-- PREVIEW A -->
    <div class="vote-card">
      <div class="preview-box">A</div>

      <h3>Preview A</h3>
      <p class="preview-desc">Una vibra más oscura y melódica.</p>

      <div class="track preview-track"
           onclick="playSong(this, 'audio/previewA.mp3')">
        ⏵ Escuchar Preview A
      </div>

      <button class="vote-btn" onclick="vote('A')">
        Votar por A
      </button>

      <p class="vote-count" id="votesA">0 votos</p>

      <!-- COMENTARIOS -->
      <div class="comments-box">
        <div class="comments-title">Comentarios</div>

        <div class="comment-list" id="commentsA"></div>

        <div class="comment-form">
          <input id="nameA" placeholder="Tu usuario">
          <input id="commentA" placeholder="Añade un comentario...">

          <button class="comment-btn"
                  onclick="addComment('A')">
            Comentar
          </button>
        </div>
      </div>
    </div>


    <!-- PREVIEW B -->
    <div class="vote-card">
      <div class="preview-box">B</div>

      <h3>Preview B</h3>
      <p class="preview-desc">Más energética y pegajosa.</p>

      <div class="track preview-track"
           onclick="playSong(this, 'audio/previewB.mp3')">
        ⏵ Escuchar Preview B
      </div>

      <button class="vote-btn" onclick="vote('B')">
        Votar por B
      </button>

      <p class="vote-count" id="votesB">0 votos</p>

      <!-- COMENTARIOS -->
      <div class="comments-box">
        <div class="comments-title">Comentarios</div>

        <div class="comment-list" id="commentsB"></div>

        <div class="comment-form">
          <input id="nameB" placeholder="Tu usuario">
          <input id="commentB" placeholder="Añade un comentario...">

          <button class="comment-btn"
                  onclick="addComment('B')">
            Comentar
          </button>
        </div>
      </div>
    </div>

  </div>
</section>
