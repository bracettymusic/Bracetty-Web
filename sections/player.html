<div class="bottom-player">
  <div class="now-playing" id="nowPlaying">Selecciona una canción</div>

  <div class="player-row">
    <button onclick="previousTrack()">⏮</button>
    <button id="playBtn">⏵</button>
    <button onclick="nextTrack()">⏭</button>
    <button id="lyricsBtn" onclick="toggleLyricsPanel()">🎤</button>

    <div class="progress-wrapper">
      <div class="progress-container" onclick="setProgress(event)">
        <div id="progress"></div>
      </div>

      <div class="time">
        <span id="current">0:00</span>
        <span id="duration">0:00</span>
      </div>
    </div>
  </div>

  <audio id="audio"></audio>
</div>

<div id="lyricsPanel" class="lyrics-panel">
  <div class="lyrics-bg"></div>

  <button class="lyrics-close" onclick="toggleLyricsPanel()">✕</button>

  <div class="lyrics-full-layout">
    <div class="lyrics-left">
      <img id="lyricsCover" src="images/irme.PNG" alt="Cover">

      <h2 id="lyricsPanelTitle">IRME</h2>
      <p>BRACETTY</p>

      <div class="lyrics-progress-bar" onclick="setProgress(event)">
        <div id="lyricsProgress"></div>
      </div>

      <div class="lyrics-time">
        <span id="lyricsCurrent">0:00</span>
        <span id="lyricsDuration">0:00</span>
      </div>

      <div class="lyrics-controls">
        <button onclick="previousTrack()">⏮</button>
<button onclick="toggleMainPlay()" id="lyricsPlayBtn">⏵</button>
        <button onclick="nextTrack()">⏭</button>
      </div>
    </div>

    <div id="lyricsPanelText" class="lyrics-panel-text"></div>
  </div>
</div>
